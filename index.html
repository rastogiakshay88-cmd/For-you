<!DOCTYPE html>
<html>
<head>

<title>For My Love</title>

<style>

body{
margin:0;
background:#000;
font-family:sans-serif;
color:white;
text-align:center;
overflow-x:hidden;
}

/* stars */

.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
animation:moveStars 100s linear infinite;
}

@keyframes moveStars{
from{background-position:0 0;}
to{background-position:10000px 5000px;}
}

/* moon */

.moon{
position:fixed;
top:80px;
right:120px;
width:120px;
height:120px;
background:#fff;
border-radius:50%;
box-shadow:0 0 40px white;
}

/* header */

header{
padding-top:120px;
}

h1{
font-size:45px;
}

/* gallery */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:40px;
}

.gallery img{
width:100%;
border-radius:20px;
transition:0.4s;
}

.gallery img:hover{
transform:scale(1.08);
}

/* captions */

.caption{
margin-top:10px;
font-size:14px;
}

/* heart */

.heart{
font-size:40px;
color:red;
animation:beat 1s infinite;
}

@keyframes beat{
0%{transform:scale(1)}
50%{transform:scale(1.3)}
100%{transform:scale(1)}
}

</style>

</head>

<body>

<div class="stars"></div>
<div class="moon"></div>

<header>

<h1>For You ❤️</h1>
<p>In this whole universe, you are my favorite person.</p>

</header>

<h2>Our Memories</h2>

<div class="gallery">

<div>
<img src="1.jpeg">
<div class="caption">The moment I realized you are special</div>
</div>

<div>
<img src="2.jpeg">
<div class="caption">Your smile makes my world brighter</div>
</div>

<div>
<img src="3.jpeg">
<div class="caption">Every moment with you is magical</div>
</div>

<div>
<img src="4.jpeg">
<div class="caption">Forever my favorite person</div>
</div>

</div>

<p>I love you more than all the stars in the sky</p>

<div class="heart">❤️</div>

</body>
</html>
